<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأسئلة | Smart QR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (same as teacher.html) -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3><i class="fa-solid fa-qrcode"></i> Smart QR</h3>
                <p>لوحة تحكم المعلم</p>
            </div>
            <nav class="sidebar-nav">
                <a href="teacher.html"><i class="fa-solid fa-home"></i> <span>الرئيسية</span></a>
                <a href="teacher-questions.html" class="active"><i class="fa-solid fa-circle-question"></i> <span>إدارة الأسئلة</span></a>
                <a href="teacher-statistics.html"><i class="fa-solid fa-chart-bar"></i> <span>الإحصائيات</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">م</div>
                    <div class="user-details">
                        <p id="sidebarUserName">معلم</p>
                        <small>Teacher</small>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>❓ إدارة الأسئلة</h1>
                <p>إنشاء أسئلة للطلاب مع مؤقت زمني</p>
            </div>

            <!-- Create Question -->
            <div class="card">
                <div class="card-header"><h2>➕ إنشاء سؤال جديد</h2></div>
                
                <div class="form-group">
                    <label for="questionText">نص السؤال</label>
                    <div class="input-wrapper">
                        <textarea id="questionText" rows="3" placeholder="أدخل السؤال هنا..."></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label for="questionType">نوع السؤال</label>
                    <div class="input-wrapper">
                        <select id="questionType" onchange="toggleQuestionType()">
                            <option value="mcq">اختيار من متعدد (MCQ)</option>
                            <option value="truefalse">صح / خطأ</option>
                        </select>
                    </div>
                </div>

                <!-- MCQ Options -->
                <div id="mcqOptions">
                    <div class="form-row" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 200px;">
                            <label>الخيار A</label>
                            <input type="text" id="optionA" placeholder="الخيار الأول">
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 200px;">
                            <label>الخيار B</label>
                            <input type="text" id="optionB" placeholder="الخيار الثاني">
                        </div>
                    </div>
                    <div class="form-row" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 200px;">
                            <label>الخيار C</label>
                            <input type="text" id="optionC" placeholder="الخيار الثالث">
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 200px;">
                            <label>الخيار D</label>
                            <input type="text" id="optionD" placeholder="الخيار الرابع">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="correctMCQ">الإجابة الصحيحة</label>
                        <select id="correctMCQ">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                </div>

                <!-- True/False Options -->
                <div id="tfOptions" style="display: none;">
                    <div class="form-group">
                        <label for="correctTF">الإجابة الصحيحة</label>
                        <select id="correctTF">
                            <option value="true">صح</option>
                            <option value="false">خطأ</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="questionDuration">المدة الزمنية (دقائق)</label>
                    <input type="number" id="questionDuration" value="5" min="1" max="30">
                </div>

                <button class="btn-primary" onclick="createQuestion()">
                    <i class="fa-solid fa-plus"></i> إضافة السؤال
                </button>
                <div id="questionMessage"></div>
            </div>

            <!-- Questions List -->
            <div class="card">
                <div class="card-header"><h2>📚 الأسئلة المنشورة</h2></div>
                <div id="questionsList">
                    <p class="empty-state">لا توجد أسئلة بعد</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/session.js"></script>
    <script src="js/questions.js"></script>
</body>
</html>
