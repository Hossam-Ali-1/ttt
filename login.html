<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Smart QR Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Brand -->
            <div class="auth-brand">
                <div class="brand-icon"><i class="fa-solid fa-qrcode"></i></div>
                <h1>Smart QR</h1>
                <p>تسجيل الدخول إلى حسابك</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" novalidate>
                
                <!-- Email -->
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="example@email.com" dir="ltr" required>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> كلمة المرور</label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password', 'toggleIcon1')">
                            <i id="toggleIcon1" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>تذكرني</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
                </button>

                <div id="globalMessage"></div>
            </form>

            <!-- Register Link -->
            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotPasswordModal" style="display: none;">
        <div class="modal">
            <h3><i class="fa-solid fa-key"></i> استعادة كلمة المرور</h3>
            <div class="form-group">
                <label for="resetInput">أدخل البريد الإلكتروني أو الرقم القومي</label>
                <input type="text" id="resetInput" placeholder="email@example.com أو الرقم القومي" dir="ltr">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="handleForgotPassword()">
                    <i class="fa-solid fa-search"></i> بحث
                </button>
                <button class="btn-outline" onclick="closeForgotModal()">إلغاء</button>
            </div>
            <div id="resetMessage" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/session.js"></script>
    <script>
        // ==================== DOM Elements ====================
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const globalMessage = document.getElementById('globalMessage');
        const forgotModal = document.getElementById('forgotPasswordModal');
        const forgotLink = document.getElementById('forgotPasswordLink');
        const resetMessage = document.getElementById('resetMessage');

        // ==================== Auto-Login Check ====================
        window.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (user) {
                console.log('🔄 Auto-login detected for:', user.email);
                globalMessage.innerHTML = '<div class="global-success"><i class="fa-solid fa-spinner fa-spin"></i> جاري تسجيل الدخول تلقائياً...</div>';
                setTimeout(() => redirectToDashboard(user.role), 800);
            }
        });

        // ==================== Show Messages ====================
        function showError(message) {
            globalMessage.innerHTML = `<div class="global-error"><i class="fa-solid fa-circle-exclamation"></i> ${message}</div>`;
        }

        function clearMessage() {
            globalMessage.innerHTML = '';
        }

        function setError(fieldId, message) {
            document.getElementById(fieldId + 'Error').textContent = message;
        }

        // ==================== Submit Handler ====================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessage();
            setError('email', '');
            setError('password', '');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            let isValid = true;
            if (!email) { setError('email', 'البريد الإلكتروني مطلوب'); isValid = false; }
            if (!password) { setError('password', 'كلمة المرور مطلوبة'); isValid = false; }
            if (!isValid) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري تسجيل الدخول...';

            try {
                const user = await loginUser(email, password);
                saveSession(user, rememberMe);
                redirectToDashboard(user.role);
            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
            }
        });

        // ==================== Forgot Password ====================
        forgotLink.addEventListener('click', function(e) {
            e.preventDefault();
            forgotModal.style.display = 'flex';
            resetMessage.innerHTML = '';
        });

        function closeForgotModal() {
            forgotModal.style.display = 'none';
            document.getElementById('resetInput').value = '';
            resetMessage.innerHTML = '';
        }

        async function handleForgotPassword() {
            const input = document.getElementById('resetInput').value.trim();
            if (!input) {
                resetMessage.innerHTML = '<div class="global-error">يرجى إدخال البريد الإلكتروني أو الرقم القومي</div>';
                return;
            }

            try {
                const user = await findUserForReset(input);
                resetMessage.innerHTML = `
                    <div class="global-success">
                        <i class="fa-solid fa-circle-info"></i> تم العثور على حساب: <strong>${user.fullName}</strong><br>
                        <small>خاصية استعادة كلمة المرور غير مفعلة في هذا الإصدار التجريبي. في التطبيق الفعلي، سيتم إرسال رابط إعادة التعيين إلى: ${user.email}</small>
                    </div>
                `;
            } catch (error) {
                resetMessage.innerHTML = `<div class="global-error">${error.message}</div>`;
            }
        }

        // Close modal on outside click
        window.addEventListener('click', function(e) {
            if (e.target === forgotModal) closeForgotModal();
        });
    </script>
</body>
</html>
